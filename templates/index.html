<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <style>
        body { font-family: Arial; background:#f4f4f4; text-align:center; }
        form { background:white; padding:20px; margin:30px auto; width:400px; border-radius:10px; }
        input, select { width:90%; padding:8px; margin:5px; }
        button { padding:10px; background:#007bff; color:white; border:none; }
        a { display:block; margin-top:15px; }
    </style>
</head>
<body>
    <h2>Student Registration Form</h2>
    <form method="POST">
        <input type="text" name="id" placeholder="Unique ID" required>
        <input type="text" name="name" placeholder="Name" required>
        <input type="number" name="age" placeholder="Age" required>

        <select name="gender" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <input type="date" name="dob" required>
        <input type="text" name="phone" placeholder="Phone Number" required>
        <input type="email" name="email" placeholder="Email" required>

        <button type="submit">Add Student</button>
    </form>

    <a href="/view">View Student By ID</a>
</body>
</html>
